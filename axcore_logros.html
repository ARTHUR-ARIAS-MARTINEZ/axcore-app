<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AX-CORE — Logros</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#fff;font-family:'Arial',sans-serif;min-height:100vh;padding:20px}

.logros-container{max-width:480px;margin:0 auto}

.section-title{font-size:11px;letter-spacing:3px;color:#0D7377;text-transform:uppercase;margin-bottom:16px;font-weight:700}

/* MÉTRICAS SELECTOR */
.metrics-select{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.metric-chip{background:#111118;border:1px solid #222;border-radius:6px;padding:8px 10px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:all .2s;font-size:12px;color:#888}
.metric-chip input{display:none}
.metric-chip.active{border-color:#0D7377;color:#fff;background:#0D7377_15}
.metric-chip .dot{width:8px;height:8px;border-radius:50%;border:1.5px solid #444;flex-shrink:0;transition:all .2s}
.metric-chip.active .dot{background:#0D7377;border-color:#0D7377}

/* ESTILOS */
.styles-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.style-thumb{aspect-ratio:3/4;border-radius:8px;cursor:pointer;border:2px solid transparent;overflow:hidden;position:relative;transition:all .2s}
.style-thumb.active{border-color:#0D7377;box-shadow:0 0 0 2px #0D7377}
.style-thumb canvas{width:100%;height:100%;display:block}
.style-thumb .style-label{position:absolute;bottom:0;left:0;right:0;padding:4px;text-align:center;font-size:9px;font-weight:700;letter-spacing:1px;background:rgba(0,0,0,.6);color:#fff;text-transform:uppercase}

/* FORMATOS */
.formats-row{display:flex;gap:8px;margin-bottom:20px}
.format-btn{flex:1;padding:10px;border:1px solid #222;background:#111118;border-radius:6px;color:#888;font-size:11px;cursor:pointer;text-align:center;transition:all .2s;letter-spacing:1px}
.format-btn.active{border-color:#0D7377;color:#0D7377}
.format-icon{font-size:16px;display:block;margin-bottom:3px}

/* PREVIEW */
.preview-wrap{position:relative;margin-bottom:20px;border-radius:10px;overflow:hidden;background:#111}
.preview-wrap canvas{width:100%;height:auto;display:block}
.preview-label{position:absolute;top:8px;right:8px;background:rgba(13,115,119,.9);color:#fff;font-size:9px;padding:3px 8px;border-radius:4px;letter-spacing:2px;text-transform:uppercase}

/* BOTÓN */
.share-btn{width:100%;padding:16px;background:linear-gradient(135deg,#0D7377,#0a5a5d);border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:700;letter-spacing:3px;cursor:pointer;text-transform:uppercase;transition:all .2s}
.share-btn:active{transform:scale(.98);opacity:.9}

.divider{height:1px;background:#1a1a24;margin:16px 0}
</style>
</head>
<body>
<div class="logros-container">

  <p class="section-title">Sistema de Logros AX-CORE</p>

  <!-- MÉTRICAS -->
  <p class="section-title" style="margin-top:4px;color:#555">Metricas a mostrar</p>
  <div class="metrics-select" id="metricsSelect"></div>

  <div class="divider"></div>

  <!-- ESTILOS -->
  <p class="section-title">Estilo visual</p>
  <div class="styles-grid" id="stylesGrid"></div>

  <div class="divider"></div>

  <!-- FORMATOS -->
  <p class="section-title">Formato</p>
  <div class="formats-row" id="formatsRow">
    <button class="format-btn active" data-fmt="story" onclick="selectFormat(this,'story')">
      <span class="format-icon">▯</span>Story<br><span style="font-size:9px;opacity:.6">1080×1350</span>
    </button>
    <button class="format-btn" data-fmt="square" onclick="selectFormat(this,'square')">
      <span class="format-icon">□</span>Cuadrado<br><span style="font-size:9px;opacity:.6">1080×1080</span>
    </button>
    <button class="format-btn" data-fmt="landscape" onclick="selectFormat(this,'landscape')">
      <span class="format-icon">▭</span>Paisaje<br><span style="font-size:9px;opacity:.6">1920×1080</span>
    </button>
  </div>

  <div class="divider"></div>

  <!-- PREVIEW -->
  <p class="section-title">Vista previa</p>
  <div class="preview-wrap">
    <canvas id="previewCanvas"></canvas>
    <span class="preview-label">Preview</span>
  </div>

  <button class="share-btn" onclick="shareCard()">Compartir Mis Logros</button>

</div>

<script>
// ═══════════════════════════════════════════
// DATOS DEL USUARIO — conectar a tu DB local
// ═══════════════════════════════════════════
const USER = {
  nombre: 'CARLOS MENDEZ',
  deficit: 18420,
  peso: 84.5,
  pesometa: 78,
  cintura: 88,
  biceps: 38,
  triceps: 36,
  pecho: 102,
  espalda: 95,
  pierna: 58,
  cadera: 96,
  pantorrilla: 38,
  gluteo: 101,
  cuello: 40,
  antebrazo: 29
};

const ALL_METRICS = [
  {key:'deficit',   label:'Deficit',   unit:'kcal', icon:'▼'},
  {key:'peso',      label:'Peso',      unit:'kg',   icon:'⊕'},
  {key:'pesometa',  label:'Meta',      unit:'kg',   icon:'◎'},
  {key:'cintura',   label:'Cintura',   unit:'cm',   icon:'○'},
  {key:'pecho',     label:'Pecho',     unit:'cm',   icon:'▣'},
  {key:'biceps',    label:'Biceps',    unit:'cm',   icon:'↑'},
  {key:'pierna',    label:'Pierna',    unit:'cm',   icon:'|'},
  {key:'cadera',    label:'Cadera',    unit:'cm',   icon:'~'},
  {key:'gluteo',    label:'Gluteo',    unit:'cm',   icon:'◯'},
  {key:'espalda',   label:'Espalda',   unit:'cm',   icon:'≡'},
  {key:'pantorrilla',label:'Pantorr.', unit:'cm',   icon:'↓'},
  {key:'cuello',    label:'Cuello',    unit:'cm',   icon:'—'},
];

let selectedMetrics = ['deficit','cintura','peso'];
let selectedStyle   = 0;
let selectedFormat  = 'story';

const FORMATS = {
  story:     {w:1080, h:1350},
  square:    {w:1080, h:1080},
  landscape: {w:1920, h:1080}
};

// ═══════════════════════════════════════════
// ESTILOS — fondos generados 100% por código
// ═══════════════════════════════════════════
const STYLES = [

  // 0 — MILITAR
  {
    name:'Militar',
    bg(ctx,W,H){
      ctx.fillStyle='#0a0f08'; ctx.fillRect(0,0,W,H);
      // cuadrícula táctica
      ctx.strokeStyle='rgba(60,90,40,.25)'; ctx.lineWidth=1;
      const g=W/20;
      for(let x=0;x<W;x+=g){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
      for(let y=0;y<H;y+=g){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
      // degradado lateral
      let grd=ctx.createLinearGradient(0,0,W,H);
      grd.addColorStop(0,'rgba(40,70,20,.7)');
      grd.addColorStop(1,'rgba(0,0,0,.85)');
      ctx.fillStyle=grd; ctx.fillRect(0,0,W,H);
      // líneas diagonales
      ctx.strokeStyle='rgba(80,120,40,.15)'; ctx.lineWidth=2;
      for(let i=-H;i<W;i+=80){
        ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i+H,H);ctx.stroke();
      }
    },
    panel:'rgba(20,35,10,.75)',
    accent:'#7CB518',
    accent2:'#9ED63A',
    textColor:'#e8f5d0',
    badge:'rgba(124,181,24,.2)',
    badgeBorder:'#7CB518'
  },

  // 1 — NEON NOCTURNO
  {
    name:'Neon Noc.',
    bg(ctx,W,H){
      ctx.fillStyle='#03000f'; ctx.fillRect(0,0,W,H);
      // partículas / puntos
      for(let i=0;i<200;i++){
        const x=Math.random()*W, y=Math.random()*H, r=Math.random()*1.5+.3;
        ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
        ctx.fillStyle=`rgba(${Math.random()>0.5?'160,50,255':'50,160,255'},.${Math.floor(Math.random()*8+2)})`;
        ctx.fill();
      }
      // halo central
      let g=ctx.createRadialGradient(W*.5,H*.45,0,W*.5,H*.45,W*.6);
      g.addColorStop(0,'rgba(120,0,255,.25)');
      g.addColorStop(.5,'rgba(0,80,255,.1)');
      g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      // líneas horizontales scan
      ctx.strokeStyle='rgba(100,0,255,.06)'; ctx.lineWidth=1;
      for(let y=0;y<H;y+=4){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
    },
    panel:'rgba(10,0,30,.8)',
    accent:'#a020ff',
    accent2:'#00ccff',
    textColor:'#e0d0ff',
    badge:'rgba(160,32,255,.2)',
    badgeBorder:'#a020ff'
  },

  // 2 — FIBRA DE CARBONO
  {
    name:'Carbono',
    bg(ctx,W,H){
      const s=24;
      for(let x=0;x<W;x+=s){
        for(let y=0;y<H;y+=s){
          const dark=(x+y)%48===0;
          ctx.fillStyle=dark?'#1a1a1a':'#141414';
          ctx.fillRect(x,y,s/2,s/2);
          ctx.fillStyle=dark?'#141414':'#1a1a1a';
          ctx.fillRect(x+s/2,y,s/2,s/2);
          ctx.fillStyle=dark?'#181818':'#121212';
          ctx.fillRect(x,y+s/2,s/2,s/2);
          ctx.fillStyle=dark?'#121212':'#181818';
          ctx.fillRect(x+s/2,y+s/2,s/2,s/2);
        }
      }
      let g=ctx.createLinearGradient(0,0,0,H);
      g.addColorStop(0,'rgba(255,255,255,.04)');
      g.addColorStop(.5,'rgba(0,0,0,0)');
      g.addColorStop(1,'rgba(0,0,0,.4)');
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    },
    panel:'rgba(25,25,28,.85)',
    accent:'#C0C0C0',
    accent2:'#e8e8e8',
    textColor:'#cccccc',
    badge:'rgba(200,200,200,.15)',
    badgeBorder:'#888'
  },

  // 3 — FUEGO
  {
    name:'Fuego',
    bg(ctx,W,H){
      ctx.fillStyle='#0d0200'; ctx.fillRect(0,0,W,H);
      // capas de fuego
      [[W*.5,H*.9,W*.7,'rgba(200,60,0,.5)','rgba(0,0,0,0)'],
       [W*.3,H*.7,W*.5,'rgba(255,120,0,.35)','rgba(0,0,0,0)'],
       [W*.7,H*.8,W*.4,'rgba(255,80,0,.3)','rgba(0,0,0,0)']].forEach(([x,y,r,c1,c2])=>{
        let g=ctx.createRadialGradient(x,y,0,x,y,r);
        g.addColorStop(0,c1); g.addColorStop(1,c2);
        ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      });
      // chispas
      for(let i=0;i<80;i++){
        const x=Math.random()*W, y=Math.random()*H*.8+H*.1;
        const r=Math.random()*2+.5;
        ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,${Math.floor(Math.random()*100+100)},0,.${Math.floor(Math.random()*6+3)})`;
        ctx.fill();
      }
    },
    panel:'rgba(30,8,0,.82)',
    accent:'#FF6600',
    accent2:'#FFaa00',
    textColor:'#ffe8cc',
    badge:'rgba(255,100,0,.2)',
    badgeBorder:'#FF6600'
  },

  // 4 — HIELO
  {
    name:'Hielo',
    bg(ctx,W,H){
      ctx.fillStyle='#000d1a'; ctx.fillRect(0,0,W,H);
      let g=ctx.createLinearGradient(0,0,W,H);
      g.addColorStop(0,'rgba(0,60,120,.6)');
      g.addColorStop(.5,'rgba(0,100,180,.3)');
      g.addColorStop(1,'rgba(0,20,60,.8)');
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      // cristales
      ctx.strokeStyle='rgba(100,200,255,.12)'; ctx.lineWidth=1;
      for(let i=0;i<30;i++){
        const x=Math.random()*W, y=Math.random()*H, len=Math.random()*80+20;
        const ang=Math.random()*Math.PI*2;
        ctx.beginPath();ctx.moveTo(x,y);
        ctx.lineTo(x+Math.cos(ang)*len,y+Math.sin(ang)*len);
        ctx.stroke();
        ctx.beginPath();ctx.moveTo(x,y);
        ctx.lineTo(x+Math.cos(ang+Math.PI/3)*len*.6,y+Math.sin(ang+Math.PI/3)*len*.6);
        ctx.stroke();
      }
      // brillo superior
      let g2=ctx.createRadialGradient(W*.5,0,0,W*.5,0,H*.6);
      g2.addColorStop(0,'rgba(150,220,255,.2)');
      g2.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g2; ctx.fillRect(0,0,W,H);
    },
    panel:'rgba(0,20,45,.85)',
    accent:'#00BFFF',
    accent2:'#80E0FF',
    textColor:'#d0f0ff',
    badge:'rgba(0,191,255,.2)',
    badgeBorder:'#00BFFF'
  },

  // 5 — ACERO
  {
    name:'Acero',
    bg(ctx,W,H){
      let g=ctx.createLinearGradient(0,0,W,H);
      g.addColorStop(0,'#1a1a2e');
      g.addColorStop(.4,'#16213e');
      g.addColorStop(1,'#0f1322');
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      // líneas metálicas
      ctx.strokeStyle='rgba(255,255,255,.04)'; ctx.lineWidth=1;
      for(let y=0;y<H;y+=3){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
      // reflejo diagonal
      let g2=ctx.createLinearGradient(0,0,W,H*.3);
      g2.addColorStop(0,'rgba(255,255,255,.06)');
      g2.addColorStop(1,'rgba(255,255,255,0)');
      ctx.fillStyle=g2; ctx.fillRect(0,0,W,H);
    },
    panel:'rgba(10,15,35,.88)',
    accent:'#4A90D9',
    accent2:'#7BB8F0',
    textColor:'#c8dff5',
    badge:'rgba(74,144,217,.2)',
    badgeBorder:'#4A90D9'
  },

  // 6 — SANGRE Y ORO
  {
    name:'Sangre/Oro',
    bg(ctx,W,H){
      ctx.fillStyle='#0d0005'; ctx.fillRect(0,0,W,H);
      let g=ctx.createRadialGradient(W*.2,H*.3,0,W*.2,H*.3,W*.8);
      g.addColorStop(0,'rgba(180,0,30,.5)');
      g.addColorStop(.6,'rgba(80,0,10,.3)');
      g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      // líneas doradas
      ctx.strokeStyle='rgba(180,140,0,.15)'; ctx.lineWidth=1;
      for(let i=0;i<20;i++){
        const y=Math.random()*H;
        ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y+Math.random()*40-20);ctx.stroke();
      }
    },
    panel:'rgba(20,5,5,.85)',
    accent:'#C8A600',
    accent2:'#FFD700',
    textColor:'#ffe8c0',
    badge:'rgba(200,166,0,.2)',
    badgeBorder:'#C8A600'
  },

  // 7 — MATRIX
  {
    name:'Matrix',
    bg(ctx,W,H){
      ctx.fillStyle='#000500'; ctx.fillRect(0,0,W,H);
      ctx.font=`${Math.max(10,W/80)}px monospace`;
      ctx.fillStyle='rgba(0,200,50,.12)';
      const chars='01アイウエオABCDEF';
      const cols=Math.floor(W/14);
      for(let i=0;i<cols*3;i++){
        const x=(i%cols)*14, y=Math.random()*H;
        const len=Math.floor(Math.random()*15+5);
        for(let j=0;j<len;j++){
          const alpha=j===len-1?.9:(len-j)/len*.15;
          ctx.fillStyle=`rgba(0,200,50,${alpha})`;
          ctx.fillText(chars[Math.floor(Math.random()*chars.length)],x,y+j*14);
        }
      }
    },
    panel:'rgba(0,15,5,.88)',
    accent:'#00CC33',
    accent2:'#00FF44',
    textColor:'#c0ffc0',
    badge:'rgba(0,200,50,.2)',
    badgeBorder:'#00CC33'
  }
];

// ═══════════════════════════════════════════
// INIT UI
// ═══════════════════════════════════════════
function initUI(){
  // Métricas
  const ms=document.getElementById('metricsSelect');
  ALL_METRICS.forEach(m=>{
    const div=document.createElement('div');
    div.className='metric-chip'+(selectedMetrics.includes(m.key)?' active':'');
    div.innerHTML=`<span class="dot"></span><span>${m.icon} ${m.label} <span style="opacity:.5">${USER[m.key]} ${m.unit}</span></span>`;
    div.onclick=()=>toggleMetric(m.key,div);
    ms.appendChild(div);
  });

  // Estilos — thumbnails
  const sg=document.getElementById('stylesGrid');
  STYLES.forEach((s,i)=>{
    const wrap=document.createElement('div');
    wrap.className='style-thumb'+(i===0?' active':'');
    wrap.onclick=()=>selectStyle(i,wrap);
    const tc=document.createElement('canvas');
    tc.width=90; tc.height=120;
    const tx=tc.getContext('2d');
    s.bg(tx,90,120);
    // mini preview texto
    tx.fillStyle=s.panel; tx.fillRect(10,35,70,50); 
    tx.fillStyle=s.accent; tx.font='bold 8px Arial';
    tx.fillText('AX-CORE',16,52);
    tx.fillStyle=s.textColor; tx.font='6px Arial';
    tx.fillText(s.name,16,64);
    wrap.appendChild(tc);
    const lbl=document.createElement('div');
    lbl.className='style-label'; lbl.textContent=s.name;
    wrap.appendChild(lbl);
    sg.appendChild(wrap);
  });

  renderPreview();
}

function toggleMetric(key,el){
  if(selectedMetrics.includes(key)){
    if(selectedMetrics.length<=1) return;
    selectedMetrics=selectedMetrics.filter(k=>k!==key);
    el.classList.remove('active');
  } else {
    if(selectedMetrics.length>=4) return;
    selectedMetrics.push(key);
    el.classList.add('active');
  }
  renderPreview();
}

function selectStyle(i,el){
  selectedStyle=i;
  document.querySelectorAll('.style-thumb').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
  renderPreview();
}

function selectFormat(el,fmt){
  selectedFormat=fmt;
  document.querySelectorAll('.format-btn').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
  renderPreview();
}

// ═══════════════════════════════════════════
// RENDER PRINCIPAL
// ═══════════════════════════════════════════
function drawCard(canvas, W, H){
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');
  const S=STYLES[selectedStyle];
  const scale=W/1080;

  // FONDO
  S.bg(ctx,W,H);

  // OVERLAY gradiente
  let ov=ctx.createLinearGradient(0,0,0,H);
  ov.addColorStop(0,'rgba(0,0,0,.45)');
  ov.addColorStop(.4,'rgba(0,0,0,.1)');
  ov.addColorStop(1,'rgba(0,0,0,.7)');
  ctx.fillStyle=ov; ctx.fillRect(0,0,W,H);

  const pad=W*.07;
  const panelW=W-pad*2;
  const panelH=H*.72;
  const panelX=pad;
  const panelY=H*.15;

  // PANEL glassmorphism
  ctx.save();
  roundRect(ctx,panelX,panelY,panelW,panelH,18*scale);
  ctx.fillStyle=S.panel; ctx.fill();
  ctx.strokeStyle=S.accent.replace('#','rgba(')+',.3)'; 
  // borde simple
  ctx.strokeStyle=hexToRgba(S.accent,.3);
  ctx.lineWidth=1.5*scale; ctx.stroke();
  ctx.restore();

  // LÍNEA SUPERIOR ACCENT
  ctx.fillStyle=S.accent;
  ctx.fillRect(panelX,panelY,panelW,3*scale);

  const cx=W*.5;
  let y=panelY+42*scale;

  // LOGO / MARCA
  ctx.save();
  ctx.shadowColor=S.accent;
  ctx.shadowBlur=20*scale;
  ctx.fillStyle=S.accent;
  ctx.font=`900 ${28*scale}px Arial`;
  ctx.textAlign='center';
  ctx.fillText('AX-CORE',cx,y);
  ctx.restore();

  y+=20*scale;

  // subtítulo
  ctx.fillStyle=hexToRgba(S.textColor,.5);
  ctx.font=`${10*scale}px Arial`;
  ctx.letterSpacing='4px';
  ctx.fillText('BIOLOGICAL OPTIMIZATION SYSTEM',cx,y);
  ctx.letterSpacing='0px';

  y+=22*scale;

  // línea divisora
  drawLine(ctx,panelX+20*scale,y,panelX+panelW-20*scale,y,hexToRgba(S.accent,.4),1*scale);

  y+=28*scale;

  // RESULTADOS OFICIALES
  ctx.fillStyle=S.accent2;
  ctx.font=`bold ${13*scale}px Arial`;
  ctx.fillText('RESULTADOS OFICIALES',cx,y);

  y+=22*scale;

  // NOMBRE USUARIO
  ctx.save();
  ctx.shadowColor=S.accent;
  ctx.shadowBlur=14*scale;
  ctx.fillStyle='#ffffff';
  ctx.font=`900 ${30*scale}px Arial`;
  ctx.fillText(USER.nombre,cx,y);
  ctx.restore();

  y+=30*scale;
  drawLine(ctx,panelX+40*scale,y,panelX+panelW-40*scale,y,hexToRgba(S.accent,.25),1*scale);
  y+=20*scale;

  // MÉTRICAS
  const activeM=ALL_METRICS.filter(m=>selectedMetrics.includes(m.key));
  const bigMetric=activeM[0];
  const restMetrics=activeM.slice(1);

  // MÉTRICA PRINCIPAL grande
  if(bigMetric){
    const val=USER[bigMetric.key];
    // número grande con glow
    ctx.save();
    ctx.shadowColor=S.accent;
    ctx.shadowBlur=30*scale;
    // degradado en el número
    let gn=ctx.createLinearGradient(cx-60*scale,y,cx+60*scale,y+50*scale);
    gn.addColorStop(0,S.accent2);
    gn.addColorStop(1,S.accent);
    ctx.fillStyle=gn;
    ctx.font=`900 ${72*scale}px Arial`;
    ctx.fillText(val.toLocaleString(),cx,y+60*scale);
    ctx.restore();

    ctx.fillStyle=hexToRgba(S.textColor,.6);
    ctx.font=`${11*scale}px Arial`;
    ctx.letterSpacing='3px';
    ctx.fillText(bigMetric.unit.toUpperCase()+'  '+bigMetric.label.toUpperCase(),cx,y+80*scale);
    ctx.letterSpacing='0px';
    y+=100*scale;
  }

  // MÉTRICAS SECUNDARIAS en fila
  if(restMetrics.length>0){
    drawLine(ctx,panelX+30*scale,y,panelX+panelW-30*scale,y,hexToRgba(S.accent,.2),1*scale);
    y+=18*scale;
    const mW=panelW/restMetrics.length;
    restMetrics.forEach((m,i)=>{
      const mx=panelX+mW*i+mW*.5;
      // valor
      ctx.save();
      ctx.shadowColor=S.accent;
      ctx.shadowBlur=10*scale;
      ctx.fillStyle=S.accent2;
      ctx.font=`700 ${26*scale}px Arial`;
      ctx.fillText(USER[m.key],mx,y+22*scale);
      ctx.restore();
      // label
      ctx.fillStyle=hexToRgba(S.textColor,.5);
      ctx.font=`${9*scale}px Arial`;
      ctx.letterSpacing='2px';
      ctx.fillText(m.label.toUpperCase(),mx,y+36*scale);
      ctx.letterSpacing='0px';
      // separador vertical
      if(i<restMetrics.length-1){
        drawLine(ctx,panelX+mW*(i+1),y,panelX+mW*(i+1),y+44*scale,hexToRgba(S.accent,.2),.8*scale);
      }
    });
    y+=56*scale;
  }

  drawLine(ctx,panelX+20*scale,y,panelX+panelW-20*scale,y,hexToRgba(S.accent,.3),1*scale);
  y+=16*scale;

  // BADGE AX-CORE
  const bdgW=180*scale, bdgH=26*scale, bdgX=cx-bdgW/2, bdgY=y;
  ctx.save();
  roundRect(ctx,bdgX,bdgY,bdgW,bdgH,13*scale);
  ctx.fillStyle=S.badge; ctx.fill();
  ctx.strokeStyle=S.badgeBorder; ctx.lineWidth=1*scale; ctx.stroke();
  ctx.restore();
  ctx.fillStyle=S.accent;
  ctx.font=`bold ${10*scale}px Arial`;
  ctx.letterSpacing='3px';
  ctx.fillText('SISTEMA AX-CORE',cx,bdgY+17*scale);
  ctx.letterSpacing='0px';

  // PIE
  const footerY=panelY+panelH+32*scale;
  ctx.fillStyle=hexToRgba('#ffffff',.25);
  ctx.font=`${9*scale}px Arial`;
  ctx.letterSpacing='2px';
  ctx.fillText('OPTIMIZACION BIOLOGICA BY ARTHUR',cx,footerY);
  ctx.letterSpacing='0px';

  // esquinas decorativas
  drawCorners(ctx,panelX,panelY,panelW,panelH,S.accent,scale);
}

// ═══════════════════════════════════════════
// PREVIEW
// ═══════════════════════════════════════════
function renderPreview(){
  const pv=document.getElementById('previewCanvas');
  const fmt=FORMATS[selectedFormat];
  // escalar para preview max 440px ancho
  const maxW=Math.min(440,window.innerWidth-40);
  const ratio=fmt.h/fmt.w;
  const pw=maxW, ph=Math.round(maxW*ratio);
  pv.style.maxHeight='70vh';
  drawCard(pv,pw,ph);
}

// ═══════════════════════════════════════════
// COMPARTIR
// ═══════════════════════════════════════════
function shareCard(){
  const fmt=FORMATS[selectedFormat];
  const fc=document.createElement('canvas');
  drawCard(fc,fmt.w,fmt.h);
  fc.toBlob(blob=>{
    const file=new File([blob],'axcore_logros.png',{type:'image/png'});
    if(navigator.share && navigator.canShare({files:[file]})){
      navigator.share({files:[file],title:'AX-CORE — Mis Logros'}).catch(()=>downloadBlob(blob));
    } else { downloadBlob(blob); }
  },'image/png');
}

function downloadBlob(blob){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='axcore_logros.png';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawLine(ctx,x1,y1,x2,y2,color,w){
  ctx.save(); ctx.strokeStyle=color; ctx.lineWidth=w;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  ctx.restore();
}

function drawCorners(ctx,x,y,w,h,color,scale){
  const len=22*scale, thick=2.5*scale;
  ctx.strokeStyle=color; ctx.lineWidth=thick;
  [[x,y,1,1],[x+w,y,-1,1],[x,y+h,1,-1],[x+w,y+h,-1,-1]].forEach(([px,py,dx,dy])=>{
    ctx.beginPath(); ctx.moveTo(px+dx*len,py); ctx.lineTo(px,py); ctx.lineTo(px,py+dy*len); ctx.stroke();
  });
}

function hexToRgba(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

initUI();
