<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AX-CORE COACH TERMINAL</title>
    <!-- Fuentes (Gym style) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <style>
        body[data-theme="dark"] {
            background-color: #121212;
            color: #fff;
        }
        .coach-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .header-brand {
            text-align: center;
            margin-bottom: 2rem;
            margin-top: 2rem;
        }
        .header-brand h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 3rem;
            letter-spacing: 2px;
            color: #d4af37; /* Gold */
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #d4af37;
            border-radius: 10px;
            padding: 2rem;
            text-align: center;
        }
        .btn-gold {
            background: #d4af37;
            color: #000;
            border: none;
            padding: 1rem 2rem;
            font-family: 'Oswald', sans-serif;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            margin-top: 1rem;
        }
        .btn-gold:hover {
            background: #f5d15a;
        }
        .btn-red {
            background: #e8394a;
            color: #fff;
            border: none;
            padding: 0.5rem 1rem;
            font-family: 'Oswald', sans-serif;
            font-size: 1rem;
            cursor: pointer;
        }
        .client-card {
            background: rgba(255, 255, 255, 0.05);
            border-left: 5px solid #00c97a;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .client-card.paused {
            border-left: 5px solid #e8394a;
        }
        .client-info h3 { margin: 0; font-family: 'Oswald', sans-serif;}
        .client-info p { margin: 5px 0 0 0; color: #aaa; font-size: 0.9rem;}
        #dashboard { display: none; }
    </style>
</head>
<body data-theme="dark">

<div class="coach-container">
    <div class="header-brand">
        <h1>AX-CORE <br><span style="color:#fff; font-size:1.5rem;">COACH TERMINAL</span></h1>
    </div>

    <!-- Login -->
    <div id="login-section" class="auth-card">
        <h2>ACCESO EXCLUSIVO GIMNASIOS</h2>
        <div class="input-group">
            <label>CÓDIGO DE FRANQUICIA (GYM ID)</label>
            <input type="text" id="gym-id" placeholder="Ej: GYM-MASTER">
        </div>
        <div class="input-group">
            <label>CONTRASEÑA ADMINISTRADOR</label>
            <input type="password" id="gym-pass" placeholder="****">
        </div>
        <button class="btn-gold" id="btn-login">AUTORIZAR INGRESO</button>
    </div>

    <!-- Dashboard -->
    <div id="dashboard">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="font-family: 'Oswald'; color:#d4af37;">TUS ATLETAS</h2>
            <button class="btn-gold" style="width:auto; margin:0;" id="btn-new-code">+ GENERAR PASE</button>
        </div>
        
        <div id="client-list">
            <!-- Cargan via JS -->
            <p style="color:#aaa;">Cargando base de datos militar...</p>
        </div>
    </div>
</div>

<script>
    // URL DEL BACKEND RENDER EN VIVO
    const API_URL = "https://axcore-appax-core-backend.onrender.com";

    const loginSection = document.getElementById('login-section');
    const dashboard = document.getElementById('dashboard');
    const btnLogin = document.getElementById('btn-login');
    const clientList = document.getElementById('client-list');
    const btnNewCode = document.getElementById('btn-new-code');

    let currentGym = "";

    btnLogin.onclick = () => {
        const gid = document.getElementById('gym-id').value.toUpperCase().trim();
        const psw = document.getElementById('gym-pass').value;

        if(gid && psw === "1234") { // Contraseña quemada para pruebas, luego podemos usar algo más seguro
            currentGym = gid;
            loginSection.style.display = 'none';
            dashboard.style.display = 'block';
            loadClients();
        } else {
            alert("Acceso Denegado. Credenciales Inválidas.");
        }
    };

    async function loadClients() {
        clientList.innerHTML = '<p>Conectando al mainframe global...</p>';
        try {
            const res = await fetch(`${API_URL}/api/coach/codes/${currentGym}`);
            const codes = await res.json();
            
            clientList.innerHTML = '';
            
            if(codes.length === 0) {
                clientList.innerHTML = '<p>No tienes atletas activos con tu membresía.</p>';
            }

            codes.forEach(c => {
                const div = document.createElement('div');
                div.className = `client-card ${c.active ? '' : 'paused'}`;
                
                div.innerHTML = `
                    <div class="client-info">
                        <h3>${c.user}</h3>
                        <p>CÓDIGO: <strong>${c.code}</strong></p>
                        <p style="color:${c.active ? '#00c97a' : '#e8394a'}">ESTATUS: ${c.active ? 'ACTIVO (PAGO AL CORRIENTE)' : 'MÁQUINA APAGADA (ADEUDO)'}</p>
                    </div>
                    <div>
                        <button class="btn-red" style="background:${c.active ? '#e8394a' : '#00c97a'}" onclick="toggleStatus('${c.code}', ${!c.active})">
                            ${c.active ? 'PAUSAR SOFTWARE' : 'REACTIVAR SOFTWARE'}
                        </button>
                    </div>
                `;
                clientList.appendChild(div);
            });
        } catch(e) {
            clientList.innerHTML = '<p style="color:red;">Error conectando al servidor. Asegúrate que AX-CORE Backend esté online.</p>';
        }
    }

    btnNewCode.onclick = async () => {
        const userName = prompt("Nombre completo del nuevo Atleta:");
        if(!userName) return;

        btnNewCode.textContent = "CONECTANDO...";
        try {
            const res = await fetch(`${API_URL}/api/coach/generate`, {
                method: 'POST',
                headers:{ 'Content-Type': 'application/json' },
                body: JSON.stringify({ gymId: currentGym, user: userName })
            });
            const data = await res.json();
            if(data.success) {
                alert(`¡PASE GENERADO EXITOSAMENTE!\n\nDale este código a tu cliente para la PWA: ${data.code}`);
                loadClients();
            }
        } catch(e) {
            alert("Fallo de conexión crítico.");
        }
        btnNewCode.textContent = "+ GENERAR PASE";
    };

    window.toggleStatus = async (code, newStatus) => {
        if(!confirm(`¿Estás seguro que deseas ${newStatus ? 'reactivar' : 'cortar el acceso'} al atleta con código ${code}?`)) return;

        try {
            await fetch(`${API_URL}/api/coach/toggle`, {
                method: 'POST',
                headers:{ 'Content-Type': 'application/json' },
                body: JSON.stringify({ code, status: newStatus })
            });
            loadClients();
        } catch(e) {
            alert("Error ejecutando comando.");
        }
    };
</script>

</body>
</html>
