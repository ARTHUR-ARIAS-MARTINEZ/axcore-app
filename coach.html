<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AX-CORE | COACH TERMINAL VIP</title>
    <!-- Fuentes premium -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <style>
        /* ============================
           COACH TERMINAL VIP — PREMIUM
           ============================ */
        * { box-sizing: border-box; }

        body {
            background: #060610;
            overflow-x: hidden;
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: -1;
            background:
                radial-gradient(ellipse 60% 50% at 20% 10%, rgba(212,175,55,0.08), transparent),
                radial-gradient(ellipse 50% 40% at 80% 80%, rgba(0,255,136,0.06), transparent),
                radial-gradient(ellipse 40% 30% at 50% 50%, rgba(0,230,255,0.04), transparent);
            animation: bgPulse 12s ease-in-out infinite alternate;
        }
        @keyframes bgPulse {
            0% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        .gradient-text {
            background: linear-gradient(135deg, #d4af37 0%, #ffd700 40%, #f0e68c 60%, #d4af37 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: goldShimmer 4s ease-in-out infinite;
        }
        @keyframes goldShimmer {
            0%, 100% { background-position: 0% center; }
            50% { background-position: 200% center; }
        }

        .coach-container {
            max-width: 960px;
            margin: 0 auto;
            padding: 24px 16px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .dashboard-container {
            align-items: flex-start;
            justify-content: flex-start;
        }

        .header-brand {
            text-align: center; 
            margin-bottom: 2.5rem;
            position: relative;
        }
        .header-brand h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 3.8rem;
            letter-spacing: 4px;
            line-height: 1;
            text-shadow: 0 0 40px rgba(212,175,55,0.3);
        }
        .header-brand p {
            font-family: 'Oswald', sans-serif;
            font-size: 1.3rem;
            color: rgba(255,255,255,0.5);
            letter-spacing: 6px;
            margin-top: 8px;
            text-transform: uppercase;
        }
        .header-brand::after {
            content: '';
            display: block;
            width: 120px; height: 2px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            margin: 18px auto 0;
        }

        /* LOGIN */
        #login-section {
            max-width: 480px;
            margin: 0 auto;
            width: 100%;
            background: rgba(12,12,20,0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212,175,55,0.2);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 30px rgba(212,175,55,0.05);
            position: relative;
            overflow: hidden;
        }
        #login-section::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4af37, #ffd700, transparent);
        }
        #login-section h2 {
            text-align: center;
            font-family: 'Oswald', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 2rem;
            letter-spacing: 2px;
        }

        /* DASHBOARD */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            background: rgba(10,10,18,0.75);
            backdrop-filter: blur(20px);
            padding: 1.5rem 2rem;
            border-radius: 16px;
            border: 1px solid rgba(212,175,55,0.15);
            flex-wrap: wrap;
            gap: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            position: relative;
        }
        .dashboard-header::before {
            content: '';
            position: absolute; bottom: 0; left: 20px; right: 20px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212,175,55,0.3), transparent);
        }
        .dashboard-header h2 {
            font-family: 'Oswald', sans-serif;
            color: #fff;
            margin: 0;
            font-size: 1.6rem;
            letter-spacing: 1px;
        }
        .dashboard-header p {
            margin: 4px 0 0 0;
            color: rgba(255,255,255,0.4);
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        .stats-badge {
            background: rgba(212,175,55,0.08);
            color: #d4af37;
            padding: 0.6rem 1.2rem;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.85rem;
            border: 1px solid rgba(212,175,55,0.25);
            box-shadow: 0 0 15px rgba(212,175,55,0.1);
            letter-spacing: 0.5px;
            transition: all 0.3s;
        }
        .stats-badge.alert {
            background: rgba(255,50,70,0.08);
            color: #ff4757;
            border-color: rgba(255,50,70,0.3);
            box-shadow: 0 0 18px rgba(255,50,70,0.15);
            animation: alertPulse 2s ease-in-out infinite;
        }
        @keyframes alertPulse {
            0%, 100% { box-shadow: 0 0 18px rgba(255,50,70,0.15); }
            50% { box-shadow: 0 0 28px rgba(255,50,70,0.3); }
        }

        /* CLIENT GRID */
        .client-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 18px;
            max-height: calc(100vh - 240px);
            overflow-y: auto;
            padding-right: 4px;
            scrollbar-width: thin;
            scrollbar-color: rgba(212,175,55,0.3) transparent;
        }
        .client-grid::-webkit-scrollbar { width: 4px; }
        .client-grid::-webkit-scrollbar-thumb {
            background: rgba(212,175,55,0.3);
            border-radius: 10px;
        }

        .client-card {
            background: rgba(14,14,24,0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-left: 4px solid #00ff88;
            border-radius: 16px;
            padding: 1.8rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            box-shadow: 0 6px 24px rgba(0,0,0,0.3);
        }
        .client-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 48px rgba(0,0,0,0.5), 0 0 20px rgba(0,255,136,0.08);
            border-color: rgba(0,255,136,0.15);
        }
        .client-card.paused {
            border-left-color: #ff4757;
            opacity: 0.65;
        }
        .client-card.paused:hover {
            box-shadow: 0 16px 48px rgba(0,0,0,0.5), 0 0 20px rgba(255,71,87,0.1);
            border-color: rgba(255,71,87,0.15);
        }

        .client-card h3 {
            margin: 0 0 12px 0;
            font-family: 'Oswald', sans-serif;
            font-size: 1.4rem;
            color: #fff;
            padding-right: 24px;
            letter-spacing: 0.5px;
        }
        .client-card p {
            margin: 0 0 6px 0;
            color: rgba(255,255,255,0.5);
            font-size: 0.88rem;
        }

        .btn-delete-x {
            position: absolute; right: 16px; top: 16px;
            background: rgba(255,71,87,0.08);
            border: 1px solid rgba(255,71,87,0.15);
            color: rgba(255,71,87,0.5);
            font-size: 0.85rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            width: 28px; height: 28px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-delete-x:hover {
            transform: scale(1.15);
            color: #ff4757;
            background: rgba(255,71,87,0.15);
            box-shadow: 0 0 12px rgba(255,71,87,0.3);
        }

        .code-box {
            font-family: 'JetBrains Mono', monospace, 'Courier New';
            background: rgba(212,175,55,0.08);
            padding: 4px 10px;
            border-radius: 8px;
            color: #ffd700;
            letter-spacing: 3px;
            font-size: 1rem;
            font-weight: 700;
            border: 1px solid rgba(212,175,55,0.15);
        }

        /* TOAST */
        .toast {
            position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #000; padding: 16px 32px;
            font-size: 0.95rem; font-weight: 800;
            border-radius: 14px; z-index: 2000;
            box-shadow: 0 8px 32px rgba(0,255,136,0.4), 0 0 60px rgba(0,255,136,0.2);
            opacity: 0;
            transition: opacity 0.5s ease-in-out, transform 0.5s;
            pointer-events: none;
            letter-spacing: 0.5px;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* BUTTONS */
        .btn-premium {
            background: linear-gradient(135deg, #d4af37, #ffd700);
            color: #000;
            font-weight: 800;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            padding: 0.9rem 1.6rem;
        }
        .btn-premium:hover {
            box-shadow: 0 6px 24px rgba(212,175,55,0.4);
            transform: translateY(-2px);
        }
        .btn-premium:active { transform: scale(0.97); }

        .btn-cancel {
            background: transparent;
            border: 1px solid;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-cancel:hover { transform: translateY(-1px); }

        /* INPUT */
        .input-group { margin-bottom: 0; }
        .input-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .input-group input[type="text"],
        .input-group input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
            outline: none;
        }
        .input-group input:focus {
            border-color: rgba(212,175,55,0.5);
            box-shadow: 0 0 16px rgba(212,175,55,0.15);
        }

        #dashboard { display: none; margin-top: -3vh; }

        /* Responsive */
        @media (max-width: 600px) {
            .header-brand h1 { font-size: 2.6rem; }
            .dashboard-header { padding: 1.2rem; }
            .client-grid { grid-template-columns: 1fr; }
            .client-card { padding: 1.2rem; }
        }
    </style>
</head>
<body data-theme="dark">

<div class="coach-container pb-transition" id="main-container">
    <div class="header-brand">
        <h1><span class="gradient-text">AX-CORE</span></h1>
        <p style="font-family: 'Oswald'; font-size: 1.5rem; color:#fff; letter-spacing: 2px; margin-top:5px;">COACH TERMINAL VIP</p>
    </div>

    <!-- Login -->
    <div id="login-section" class="glass-card" style="max-width: 500px; margin: 0 auto; width: 100%;">
        <h2 style="text-align: center; color: var(--accent-main); font-family: 'Oswald'; margin-bottom: 1.5rem;">ACCESO PARA DUEÑOS</h2>
        <div class="input-group">
            <label style="color:var(--accent-main); font-size: 0.85rem; font-weight:bold;">1. Código de Franquicia (Ej. AXB-1234)</label>
            <input type="text" id="gym-id" autocomplete="off" placeholder="Pega aquí tu código" style="font-size: 1rem; text-align: center; letter-spacing: 1px; text-transform: uppercase;">
            <div style="font-size:0.65rem; color:#888; margin-top:5px;">Este código te lo proporciona el corporativo (AX-CORE).</div>
        </div>
        <div class="input-group" style="margin-top:1.5rem;">
            <label style="color:#ffaa00; font-size: 0.85rem; font-weight:bold;">2. Contraseña Asignada</label>
            <input type="password" id="gym-pass" autocomplete="new-password" placeholder="Pega aquí tu contraseña" style="font-size: 1rem; text-align: center; letter-spacing: 2px;">
        </div>
        <button class="btn-premium" id="btn-login" style="width: 100%; margin-top: 1.5rem; padding: 1.2rem; font-size: 1.1rem;">INICIAR SESIÓN</button>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="dashboard-container">
        
        <div class="dashboard-header">
            <div>
                <h2 style="font-family: 'Oswald'; color:#fff; margin:0;" id="gym-name-display">GIMNASIO...</h2>
                <p style="margin:5px 0 0 0; color:#aaa; font-size:0.85rem;" id="gym-code-display">CÓDIGO: ---</p>
            </div>
            <div style="display:flex; gap: 10px; align-items:center;">
                <div id="stats-users" class="stats-badge">CARGANDO...</div>
                <button class="btn-premium" style="margin:0; font-size:0.9rem; padding:0.8rem 1.5rem;" id="btn-new-code">+ GENERAR PASE NUEVO</button>
            </div>
        </div>
        
        <div id="client-list" class="client-grid">
            <div class="glass-card" style="grid-column: 1/-1; text-align:center; padding: 3rem;">
                <p style="color:#aaa; font-size: 1.2rem;">Sincronizando con base de datos global de AX-CORE...</p>
            </div>
        </div>
    </div>
    <div id="toast" class="toast">¡PASE GENERADO EXITOSAMENTE!</div>
</div>

<script>
    // URL DEL BACKEND (Local si estás tu computadora, Render si está hospedado)
    const API_URL = location.hostname === 'localhost' || location.hostname === '127.0.0.1' ? 'http://localhost:3000' : 'https://axcore-appax-core-backend.onrender.com';

    const loginSection = document.getElementById('login-section');
    const dashboard = document.getElementById('dashboard');
    const btnLogin = document.getElementById('btn-login');
    const clientList = document.getElementById('client-list');
    const btnNewCode = document.getElementById('btn-new-code');
    const gymContainer = document.getElementById('main-container');

    let currentGym = "";
    let gymData = {};

    btnLogin.onclick = async () => {
        const gid = document.getElementById('gym-id').value.toUpperCase().trim();
        const psw = document.getElementById('gym-pass').value.trim();

        if(!gid || !psw) return alert("Completa ambos campos obligatorios.");
        btnLogin.textContent = "VERIFICANDO...";

        try {
            const res = await fetch(`${API_URL}/api/coach/login`, {
                method: 'POST',
                headers:{ 'Content-Type': 'application/json' },
                body: JSON.stringify({ gymCode: gid, password: psw })
            });
            const data = await res.json();
            
            if(data.success) {
                currentGym = gid;
                gymData = data.gym;
                gymData.currentUsers = data.currentUsers;

                loginSection.style.display = 'none';
                dashboard.style.display = 'block';
                gymContainer.style.justifyContent = 'flex-start'; // Quitamos el centro vertical al entrar

                document.getElementById('gym-name-display').textContent = gymData.name.toUpperCase();
                document.getElementById('gym-code-display').textContent = `ID SUCURSAL: ${gymData.gymCode}`;
                
                loadClients();
            } else {
                alert(data.message);
            }
        } catch(e) {
            alert("Error de conexión al servidor maestro. Intente de nuevo.");
            console.error(e);
        }
        btnLogin.textContent = "INICIAR SESIÓN";
    };

    async function loadClients() {
        try {
            const res = await fetch(`${API_URL}/api/coach/codes/${currentGym}`);
            const codes = await res.json();
            
            clientList.innerHTML = '';
            gymData.currentUsers = codes.length;
            updateStatsBadge();
            
            if(codes.length === 0) {
                clientList.innerHTML = `
                <div class="glass-card" style="grid-column: 1/-1; text-align:center; padding: 3rem;">
                    <p style="color:#aaa; font-size: 1.2rem;">No tienes atletas activos con tu membresía. Genera un pase nuevo arriba a la derecha.</p>
                </div>`;
                return;
            }

            codes.reverse().forEach(c => {
                const div = document.createElement('div');
                div.className = `client-card ${c.active ? '' : 'paused'}`;
                
                div.innerHTML = `
                    <button class="btn-delete-x" onclick="deleteClient('${c.code}', '${c.user}')">X</button>
                    <div>
                        <h3>${c.user}</h3>
                        <p>PASE: <span class="code-box">${c.code}</span></p>
                        <p style="color:${c.active ? '#00ff88' : '#e8394a'}; font-weight:bold; margin-top: 10px;">
                            ${c.active ? '✅ ACTIVO Y AL CORRIENTE' : '❌ ADEUDO / CORTADO'}
                        </p>
                    </div>
                    <div style="margin-top: 15px; display:flex; gap:10px;">
                        <button class="btn-cancel" style="flex:1; padding: 0.6rem; font-size: 0.8rem; background: ${c.active ? 'rgba(232,57,74,0.1)' : 'rgba(0,255,136,0.1)'}; border-color: ${c.active ? '#e8394a' : '#00ff88'}; color: ${c.active ? '#e8394a' : '#00ff88'};" onclick="toggleStatus('${c.code}', ${!c.active})">
                            ${c.active ? 'CORTAR ACCESO' : 'RESTAURAR ACCESO'}
                        </button>
                        <button class="btn-premium" style="flex:1; padding: 0.6rem; font-size: 0.8rem;" onclick="shareAthleteCode('${c.user}', '${c.code}')">📱 COMPARTIR</button>
                    </div>
                `;
                clientList.appendChild(div);
            });
        } catch(e) {
            clientList.innerHTML = '<p style="color:red; text-align:center;">Error conectando al servidor maestro.</p>';
        }
    }

    function updateStatsBadge() {
        const badge = document.getElementById('stats-users');
        const limitStr = gymData.maxUsers === 9999 ? '∞' : gymData.maxUsers;
        const used = gymData.currentUsers;
        
        badge.innerHTML = `USADOS: ${used} / ${limitStr}`;
        
        if (gymData.maxUsers !== 9999 && used >= gymData.maxUsers) {
            badge.classList.add('alert');
            badge.innerHTML = `⚠️ LÍMITE ALCANZADO (${used}/${limitStr})`;
        } else {
            badge.classList.remove('alert');
        }
    }

    btnNewCode.onclick = async () => {
        if(gymData.maxUsers !== 9999 && gymData.currentUsers >= gymData.maxUsers) {
            return alert("⛔ HAZ ALCANZADO EL LÍMITE DE USUARIOS PERMITIDO EN ESTA SUCURSAL.\nContacta al corporativo para aumentar la capacidad.");
        }

        const userName = prompt("Nombre completo del nuevo Atleta:");
        if(!userName) return;

        btnNewCode.textContent = "CONECTANDO...";
        try {
            const res = await fetch(`${API_URL}/api/coach/generate`, {
                method: 'POST',
                headers:{ 'Content-Type': 'application/json' },
                body: JSON.stringify({ gymId: currentGym, user: userName })
            });
            const data = await res.json();
            if(data.success) {
                // Mostrar notificación Toast
                const toast = document.getElementById('toast');
                toast.textContent = `¡PASE GENERADO EXITOSAMENTE PARA ${userName.toUpperCase()}! 👉 ${data.code}`;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 5000);
                
                loadClients();
            } else {
                alert(data.message);
            }
        } catch(e) {
            alert("No hay conexión con AX-CORE GLOBAL.");
        }
        btnNewCode.textContent = "+ GENERAR PASE NUEVO";
    };

    window.toggleStatus = async (code, newStatus) => {
        if(!confirm(`¿Seguro que deseas ${newStatus ? 'reestablecer' : 'cortar'} el servicio para el atleta ${code}?`)) return;

        try {
            await fetch(`${API_URL}/api/coach/toggle`, {
                method: 'POST',
                headers:{ 'Content-Type': 'application/json' },
                body: JSON.stringify({ code, status: newStatus })
            });
            loadClients();
        } catch(e) {
            alert("Error procesando solicitud externa.");
        }
    };

    window.deleteClient = async (code, userName) => {
        if(!confirm(`⚠️ ATENCIÓN:\n¿Seguro que quieres ELIMINAR PERMANENTEMENTE a ${userName} (${code})?\nEsto no se puede deshacer y cortará su acceso de inmediato.`)) return;
        
        try {
            await fetch(`${API_URL}/api/coach/users/${code}`, {
                method: 'DELETE'
            });
            loadClients();
        } catch(e) {
            alert("Error borrando el usuario en la nube.");
        }
    };

    window.shareAthleteCode = (userName, code) => {
        const text = `¡Hola ${userName}!\nAquí tienes tu pase VIP para entrar a la App AX-CORE:\n\nPASE: ${code}\n\nIngresa desde aquí: https://arthur-arias-martinez.github.io/axcore-app/`;
        navigator.clipboard.writeText(text).then(() => {
            alert(`✅ ¡Copiado!\n\nMensaje con el pase de ${userName} copiado al portapapeles. ¡Ve y pégalo en WhatsApp!`);
        }).catch(() => {
            prompt("Copia este pase manualmente:", text);
        });
    };

    // --- Enter Key Support ---
    document.getElementById('gym-id').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') btnLogin.click();
    });
    document.getElementById('gym-pass').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') btnLogin.click();
    });
</script>

</body>
</html>
